<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socios - Gestión</title>
    <link rel="Icon" href="./Utilities/avatar.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="socios-page">
    <div class="container">
      <div class="socios-header">
        <h1>Nuestros Socios</h1>
        <div class="search-section">
          <div class="search-container">
            <input
              type="text"
              placeholder="Buscar socio..."
              class="search-input"
            />
            <span class="search-icon">🔍</span>
          </div>
          <button type="button" class="btn-add-partner">
            <img
              src="./Utilities/agregar-usuario.png"
              alt="Agregar Socio"
              width="30"
              height="30"
            />
            <span>Agregar Socio</span>
          </button>
        </div>
      </div>

      <div class="partners-grid" id="partnersGrid">
        <!-- Partners will be displayed here -->
      </div>
    </div>
  </body>
</html>
