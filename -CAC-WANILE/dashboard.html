<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="/Utilities/investigacion.png" type="Icon-Banco" />
    <title>Dashboard</title>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <h1>Bienvenido administrador</h1>
      </div>

      <div>
        <card class="view">Socios registrados:</card>
      </div>

      <div>
        <card class="view">Cuentas activas:</card>
      </div>

      <div>
        <card class="view">Créditos activos:</card>
      </div>

      <div>
        <card class="view">Dinero ahorrado:</card>
      </div>

      <div>
        <card class="view">Movimientos del día:</card>
      </div>

      <h2>Últimos movimientos</h2>

      <table>
        <tr>
          <td>Fecha</td>
          <td>Socio</td>
          <td>Monto</td>
          <td>Tipo</td>
        </tr>
      </table>
    </div>
  </body>
</html>
